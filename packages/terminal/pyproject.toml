[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "apt-terminal"
version = "0.1.0"
description = "Python CLI for agenticregistry and my-agentic-storage"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Mike Fullerton", email = "mike@mikefullerton.com" }]
dependencies = [
    "typer>=0.12",
    "httpx>=0.27",
    "pydantic>=2.7",
    "rich>=13.7",
    "tomli-w>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "respx>=0.21",
    "ruff>=0.5",
    "mypy>=1.10",
    "openapi-python-client>=0.21",
]

[project.scripts]
apt = "apt_terminal.cli:_run"

[tool.hatch.build.targets.wheel]
packages = ["src/apt_terminal"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/apt_terminal"]

[[tool.mypy.overrides]]
module = "apt_terminal.generated.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
