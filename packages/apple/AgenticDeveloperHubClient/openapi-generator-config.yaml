# swift-openapi-generator configuration.
# Emits a typed client + types (no server stubs) for the entire
# api.agenticdeveloperhub.com surface described in openapi.json
# (snapshot fetched from the Scalar docs site, apidocs.agenticdeveloperstorage.com).
#
# Regenerate with: python3 scripts/generate.py
generate:
  - types
  - client
accessModifier: public
namingStrategy: idiomatic
