name: PersonaToolkit
options:
  bundleIdPrefix: com.mikefullerton.PersonaToolkit
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    watchOS: "10.0"
    tvOS: "17.0"
    visionOS: "1.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEFINES_MODULE: YES
    SKIP_INSTALL: YES
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:
  PersonaToolkit-macOS:
    type: framework
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikefullerton.PersonaToolkit.lib.macos
        PRODUCT_NAME: PersonaToolkit

  PersonaToolkit-iOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikefullerton.PersonaToolkit.lib.ios
        PRODUCT_NAME: PersonaToolkit
        TARGETED_DEVICE_FAMILY: "1,2"

  PersonaToolkit-watchOS:
    type: framework
    platform: watchOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikefullerton.PersonaToolkit.lib.watchos
        PRODUCT_NAME: PersonaToolkit

  PersonaToolkit-tvOS:
    type: framework
    platform: tvOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikefullerton.PersonaToolkit.lib.tvos
        PRODUCT_NAME: PersonaToolkit

  PersonaToolkit-visionOS:
    type: framework
    platform: visionOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikefullerton.PersonaToolkit.lib.visionos
        PRODUCT_NAME: PersonaToolkit
        TARGETED_DEVICE_FAMILY: "7"

schemes:
  PersonaToolkit-macOS:
    build:
      targets:
        PersonaToolkit-macOS: all
    run:
      config: Debug
  PersonaToolkit-iOS:
    build:
      targets:
        PersonaToolkit-iOS: all
    run:
      config: Debug
  PersonaToolkit-watchOS:
    build:
      targets:
        PersonaToolkit-watchOS: all
    run:
      config: Debug
  PersonaToolkit-tvOS:
    build:
      targets:
        PersonaToolkit-tvOS: all
    run:
      config: Debug
  PersonaToolkit-visionOS:
    build:
      targets:
        PersonaToolkit-visionOS: all
    run:
      config: Debug
